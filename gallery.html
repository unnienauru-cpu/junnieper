<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ellie — JUNNIEPER · Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #1a1710;
    --paper:  #f5f0e8;
    --sage:   #4a5c43;
    --sage-light: #7a9470;
    --text-muted: #8b8371;
    --border-soft: rgba(74, 92, 67, 0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── CUSTOM SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(139, 131, 113, 0.3); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--sage-light); }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245, 240, 232, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-soft);
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }

  .logo-link img {
    height: 32px;
    opacity: 0.9;
    transition: opacity 0.3s ease;
  }
  .logo-link:hover img { opacity: 1; }

  .back-link {
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .back-link:hover { color: var(--sage); }

  /* ── HERO PAGE INTRO (EDITORIAL STYLE) ── */
  .hero {
    max-width: 1200px;
    margin: 0 auto;
    padding: 8rem 2rem 5rem;
    text-align: center;
    animation: fadeUp 0.8s ease cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(4rem, 9vw, 8.5rem);
    font-weight: 300;
    line-height: 0.9;
    color: var(--ink);
    margin-bottom: 1.5rem;
    letter-spacing: -0.02em;
  }

  .hero-title em {
    font-style: italic;
    color: var(--sage);
    font-weight: 400;
  }

  .hero-desc {
    font-size: 15px;
    color: var(--text-muted);
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.6;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* ── FILTERS ── */
  .filters-wrap {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 2rem 4rem;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    align-items: center;
    animation: fadeUp 0.8s ease 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    opacity: 0;
  }

  .filter-pill {
    padding: 6px 20px;
    border-radius: 99px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 400;
  }

  .filter-pill:hover {
    color: var(--ink);
  }

  .filter-pill.active {
    color: var(--ink);
    border-color: var(--ink);
  }

  /* ── GALLERY GRID (STRICT 3-COLUMN EXHIBITION) ── */
  .gallery-wrap {
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 2rem 8rem;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3rem 2rem;
  }

  @media (max-width: 1024px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 650px) { .gallery-grid { grid-template-columns: 1fr; gap: 4rem 2rem; } }

  /* ── CARD PORTFOLIO STYLE ── */
  .card {
    cursor: pointer;
    background: transparent;
    border: none;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    display: flex;
    flex-direction: column;
  }

  .card-img-wrap {
    position: relative;
    overflow: hidden;
    background: rgba(0,0,0,0.03);
    /* Strict framing like a canvas */
    aspect-ratio: 3 / 4; 
    transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Ensures images fill the frame uniformly */
    display: block;
    transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .card:hover .card-img {
    transform: scale(1.05);
  }

  .card-body {
    padding: 20px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.2;
    transition: color 0.3s ease;
  }

  .card-category {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── LIGHTBOX (MUSEUM PLAQUE) ── */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(26, 23, 16, 0.98); 
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .lightbox.open {
    opacity: 1;
    pointer-events: all;
  }

  .lightbox-inner {
    max-width: 1400px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 350px;
    gap: 4rem;
    align-items: center;
    transform: scale(0.98);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .lightbox.open .lightbox-inner {
    transform: scale(1);
  }

  @media (max-width: 900px) {
    .lightbox-inner { grid-template-columns: 1fr; gap: 2rem; }
    .lightbox-info { order: 2; padding-top: 2rem; border-top: 1px solid rgba(245, 240, 232, 0.1); }
  }

  .lightbox-img {
    width: 100%;
    border-radius: 2px;
    display: block;
    max-height: 85vh;
    object-fit: contain;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .lightbox-info {
    color: var(--paper);
  }

  .lightbox-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage-light);
    margin-bottom: 1rem;
    font-weight: 400;
  }

  .lightbox-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 16px;
    color: #fff;
  }

  .lightbox-desc {
    font-size: 14px;
    color: rgba(245, 240, 232, 0.7);
    line-height: 1.8;
    font-weight: 300;
    margin-bottom: 2rem;
  }

  .lightbox-date {
    font-size: 12px;
    color: rgba(245, 240, 232, 0.4);
    letter-spacing: 0.05em;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  .lb-close {
    position: fixed;
    top: 2rem;
    right: 2rem;
    background: transparent;
    border: none;
    color: rgba(245, 240, 232, 0.8);
    width: 44px;
    height: 44px;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    z-index: 1000;
  }

  .lb-close:hover { 
    color: #fff;
    transform: rotate(90deg);
  }

  /* ── LOADING / EMPTY ── */
  .status-msg {
    text-align: center;
    padding: 6rem 1rem;
    color: var(--text-muted);
    grid-column: 1 / -1;
  }

  .status-msg .big {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 300;
    margin-bottom: 0.5rem;
    color: var(--ink);
  }

  .status-msg p { font-size: 15px; font-weight: 300; }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border-soft);
    border-top-color: var(--sage);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1.5rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border-soft);
    padding: 3rem 2rem;
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  footer a { color: var(--ink); text-decoration: none; transition: color 0.3s; }
  footer a:hover { color: var(--sage); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo-link" href="https://unnienauru-cpu.github.io/junnieper/">
      <img src="https://unnienauru-cpu.github.io/junnieper/images/logo_junnieper_ink.png" alt="JUNNIEPER" />
    </a>
    <a class="back-link" href="https://unnienauru-cpu.github.io/junnieper/">
      ← Return
    </a>
  </div>
</header>

<main>
  <section class="hero">
    <h1 class="hero-title">Selected<br><em>Works</em></h1>
    <p class="hero-desc">An archive of recent 2D art and design.</p>
  </section>

  <div class="filters-wrap" id="filters">
    <button class="filter-pill active" data-cat="all" onclick="filterBy('all')">Index</button>
  </div>

  <div class="gallery-wrap">
    <div class="gallery-grid" id="gallery">
      <div class="status-msg">
        <div class="spinner"></div>
        <p>Curating gallery…</p>
      </div>
    </div>
  </div>
</main>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lb-img" src="" alt="" />
    <div class="lightbox-info">
      <div class="lightbox-eyebrow" id="lb-cat"></div>
      <div class="lightbox-title" id="lb-title"></div>
      <div class="lightbox-desc" id="lb-desc"></div>
      <div class="lightbox-date" id="lb-date"></div>
    </div>
  </div>
</div>

<footer>
  © 2026 Ellie — <a href="https://unnienauru-cpu.github.io/junnieper/">JUNNIEPER</a>. All rights reserved.
</footer>

<script>
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRVLJ5b5WEv23YGmp3ohhCC-_SHb4jCtteoTDXdqUcqeau-MyGZnwueFiQFn2LwSpFBmgI2ZhrEJYQx/pub?gid=0&single=true&output=csv";
  
  let allItems = [];
  let activeFilter = 'all';

  async function loadSheet() {
    const gallery = document.getElementById('gallery');
    try {
      const res = await fetch(SHEET_CSV_URL + '&t=' + new Date().getTime());
      if (!res.ok) throw new Error('Could not load sheet');
      const text = await res.text();
      
      allItems = parseCSV(text);
      buildFilters();
      renderGallery(allItems);
    } catch(e) {
      console.error(e);
      gallery.innerHTML = `<div class="status-msg"><div class="big">Coming soon</div><p>New works are currently being prepared. Check back shortly.</p></div>`;
    }
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/["\s]/g,''));
    
    return lines.slice(1).map(line => {
      const vals = smartSplit(line);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,'').trim());
      return obj;
    }).filter(r => r.title && r.imageurl);
  }

  function smartSplit(line) {
    const result = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQuote = !inQuote; continue; }
      if (c === ',' && !inQuote) { result.push(cur); cur = ''; continue; }
      cur += c;
    }
    result.push(cur);
    return result;
  }

  function buildFilters() {
    const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))];
    if (cats.length === 0) return;
    const wrap = document.getElementById('filters');
    wrap.innerHTML = '<button class="filter-pill active" data-cat="all" onclick="filterBy(\'all\')">Index</button>';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-pill';
      btn.textContent = cat;
      btn.dataset.cat = cat;
      btn.onclick = () => filterBy(cat);
      wrap.appendChild(btn);
    });
  }

  function filterBy(cat) {
    activeFilter = cat;
    document.querySelectorAll('.filter-pill').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    const filtered = cat === 'all' ? allItems : allItems.filter(i => i.category === cat);
    renderGallery(filtered);
  }

  function renderGallery(items) {
    const gallery = document.getElementById('gallery');
    if (items.length === 0) {
      gallery.innerHTML = `<div class="status-msg"><div class="big">Nothing here yet</div><p>Check back soon.</p></div>`;
      return;
    }
    gallery.innerHTML = items.map((item, i) => `
      <div class="card" style="animation-delay:${i * 0.08}s" onclick="openLightbox(${i})">
        <div class="card-img-wrap">
          <img class="card-img" src="${item.imageurl}" alt="${item.title}" loading="lazy"
            onerror="this.parentElement.innerHTML='<div style=padding:4rem;text-align:center;color:#8b8371;font-size:13px>Image unavailable</div>'" />
        </div>
        <div class="card-body">
          <div class="card-title">${item.title}</div>
          <div class="card-category">${item.category || 'Artwork'}</div>
        </div>
      </div>
    `).join('');
  }

  function openLightbox(idx) {
    const filtered = activeFilter === 'all' ? allItems : allItems.filter(i => i.category === activeFilter);
    const item = filtered[idx];
    if (!item) return;
    document.getElementById('lb-img').src = item.imageurl;
    document.getElementById('lb-title').textContent = item.title;
    document.getElementById('lb-desc').textContent = item.description || '';
    document.getElementById('lb-cat').textContent = item.category || 'Archive';
    document.getElementById('lb-date').textContent = item.date || '';
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e) {
    if (e && e.target !== e.currentTarget && !e.target.classList.contains('lb-close')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  loadSheet();
</script>
</body>
</html>
