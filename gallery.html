<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ellie — JUNNIEPER · Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:    #1a1710;
    --paper:  #f5f0e8;
    --sage:   #4a5c43;
    --sage-light: #7a9470;
    --gold:   #c9a84c;
    --mist:   #e8e2d5;
    --text-muted: #8b8371;
    --border-soft: rgba(74, 92, 67, 0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── CUSTOM SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--sage-light); }

  /* ── NOISE TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245, 240, 232, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border-soft);
    padding: 0 2rem;
    transition: all 0.3s ease;
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }

  .logo-link img {
    height: 36px;
    opacity: 0.9;
    transition: opacity 0.3s ease;
  }
  .logo-link:hover img { opacity: 1; }

  .back-link {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .back-link:hover { color: var(--sage); }

  /* ── HERO PAGE INTRO ── */
  .hero {
    max-width: 1400px;
    margin: 0 auto;
    padding: 6rem 2rem 4rem;
    position: relative;
  }

  .hero-content {
    animation: fadeUp 0.8s ease cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  .hero-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--sage);
    opacity: 0.5;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.5rem, 7vw, 6rem);
    font-weight: 300;
    line-height: 0.95;
    color: var(--ink);
    margin-bottom: 1.5rem;
    letter-spacing: -0.01em;
  }

  .hero-title em {
    font-style: italic;
    color: var(--sage);
    font-weight: 400;
  }

  .hero-desc {
    font-size: 16px;
    color: var(--text-muted);
    max-width: 500px;
    line-height: 1.8;
    font-weight: 300;
  }

  .hero-deco {
    position: absolute;
    right: 2rem;
    top: 5rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 180px;
    color: var(--sage);
    opacity: 0.03;
    pointer-events: none;
    font-style: italic;
    user-select: none;
  }

  /* ── FILTERS ── */
  .filters-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 3rem;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    animation: fadeUp 0.8s ease 0.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    opacity: 0;
  }

  .filter-pill {
    padding: 8px 22px;
    border-radius: 4px;
    border: 1px solid var(--border-soft);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    font-weight: 400;
  }

  .filter-pill:hover {
    border-color: var(--sage-light);
    color: var(--sage);
    background: rgba(250, 247, 242, 0.5);
  }

  .filter-pill.active {
    background: var(--sage);
    color: #f5f0e8;
    border-color: var(--sage);
  }

  /* ── GALLERY GRID (MUSEUM LAYOUT) ── */
  .gallery-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem 8rem;
  }

  .gallery-grid {
    columns: 3;
    column-gap: 32px;
  }

  @media (max-width: 1024px) { .gallery-grid { columns: 2; column-gap: 24px; } }
  @media (max-width: 600px) { .gallery-grid { columns: 1; } }

  /* ── CARD PORTFOLIO STYLE ── */
  .card {
    break-inside: avoid;
    margin-bottom: 40px;
    cursor: pointer;
    background: transparent;
    border: none;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  .card-img-wrap {
    position: relative;
    overflow: hidden;
    background: var(--mist);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(26, 23, 16, 0.04);
    transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s ease;
  }

  .card-img {
    width: 100%;
    display: block;
    transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .card:hover .card-img-wrap {
    transform: translateY(-6px);
    box-shadow: 0 16px 40px rgba(26, 23, 16, 0.08);
  }

  .card:hover .card-img {
    transform: scale(1.03);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(20,18,15,0.7) 0%, transparent 40%);
    opacity: 0;
    transition: opacity 0.4s ease;
    display: flex;
    align-items: flex-end;
    padding: 1.5rem;
  }

  .card:hover .card-overlay { opacity: 1; }

  .overlay-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245, 240, 232, 0.9);
    transform: translateY(10px);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .card:hover .overlay-tag {
    transform: translateY(0);
  }

  .card-body {
    padding: 16px 4px 0; /* Clean text under image */
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.2;
    transition: color 0.3s ease;
  }

  .card:hover .card-title { color: var(--sage); }

  .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    font-weight: 300;
  }

  .card-date {
    font-size: 11px;
    color: var(--sage-light);
    margin-top: 10px;
    letter-spacing: 0.05em;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  /* ── LIGHTBOX (MUSEUM PLAQUE) ── */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(18, 16, 13, 0.96); /* Darker for better contrast */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .lightbox.open {
    opacity: 1;
    pointer-events: all;
  }

  .lightbox-inner {
    max-width: 1200px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 4rem;
    align-items: center;
    transform: scale(0.98);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .lightbox.open .lightbox-inner {
    transform: scale(1);
  }

  @media (max-width: 900px) {
    .lightbox-inner { grid-template-columns: 1fr; gap: 2rem; }
    .lightbox-info { order: 2; padding-top: 2rem; border-top: 1px solid rgba(245, 240, 232, 0.1); }
  }

  .lightbox-img {
    width: 100%;
    border-radius: 4px;
    display: block;
    max-height: 85vh;
    object-fit: contain;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .lightbox-info {
    color: var(--paper);
  }

  .lightbox-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage-light);
    margin-bottom: 1rem;
    font-weight: 400;
  }

  .lightbox-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 16px;
    color: #fff;
  }

  .lightbox-desc {
    font-size: 14px;
    color: rgba(245, 240, 232, 0.7);
    line-height: 1.8;
    font-weight: 300;
    margin-bottom: 2rem;
  }

  .lightbox-date {
    font-size: 12px;
    color: rgba(245, 240, 232, 0.4);
    letter-spacing: 0.05em;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  .lb-close {
    position: fixed;
    top: 2rem;
    right: 2rem;
    background: transparent;
    border: 1px solid rgba(245, 240, 232, 0.2);
    color: rgba(245, 240, 232, 0.8);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    z-index: 1000;
  }

  .lb-close:hover { 
    background: var(--paper); 
    color: var(--ink);
    transform: rotate(90deg);
  }

  /* ── LOADING / EMPTY ── */
  .status-msg {
    text-align: center;
    padding: 6rem 1rem;
    color: var(--text-muted);
    grid-column: 1 / -1;
  }

  .status-msg .big {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 300;
    margin-bottom: 0.5rem;
    color: var(--ink);
  }

  .status-msg p { font-size: 15px; font-weight: 300; }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border-soft);
    border-top-color: var(--sage);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1.5rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border-soft);
    padding: 3rem 2rem;
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  footer a { color: var(--sage); text-decoration: none; transition: color 0.3s; }
  footer a:hover { color: var(--ink); }

  .sparkle { color: var(--sage-light); font-size: 10px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo-link" href="https://unnienauru-cpu.github.io/junnieper/">
      <img src="https://unnienauru-cpu.github.io/junnieper/images/logo_junnieper_ink.png" alt="JUNNIEPER" />
    </a>
    <a class="back-link" href="https://unnienauru-cpu.github.io/junnieper/">
      ← Back to main site
    </a>
  </div>
</header>

<main>
  <section class="hero">
    <div class="hero-deco">✦</div>
    <div class="hero-content">
      <div class="hero-eyebrow">Curated Archive</div>
      <h1 class="hero-title">2D Art &<br><em>Recent Designs</em></h1>
      <p class="hero-desc">A living collection — updated as new work comes to life. Characters, commissions, illustrations, and everything beautifully in between.</p>
    </div>
  </section>

  <div class="filters-wrap" id="filters">
    <button class="filter-pill active" data-cat="all" onclick="filterBy('all')">All Works</button>
  </div>

  <div class="gallery-wrap">
    <div class="gallery-grid" id="gallery">
      <div class="status-msg">
        <div class="spinner"></div>
        <p>Curating gallery…</p>
      </div>
    </div>
  </div>
</main>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lb-img" src="" alt="" />
    <div class="lightbox-info">
      <div class="lightbox-eyebrow" id="lb-cat"></div>
      <div class="lightbox-title" id="lb-title"></div>
      <div class="lightbox-desc" id="lb-desc"></div>
      <div class="lightbox-date" id="lb-date"></div>
    </div>
  </div>
</div>

<footer>
  <span class="sparkle">✦</span> &nbsp; Ellie — <a href="https://unnienauru-cpu.github.io/junnieper/">JUNNIEPER</a> &nbsp; <span class="sparkle">✦</span>
  <br><br>© 2026 Ellie — JUNNIEPER. All rights reserved.
</footer>

<script>
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRVLJ5b5WEv23YGmp3ohhCC-_SHb4jCtteoTDXdqUcqeau-MyGZnwueFiQFn2LwSpFBmgI2ZhrEJYQx/pub?gid=0&single=true&output=csv";
  
  let allItems = [];
  let activeFilter = 'all';

  async function loadSheet() {
    const gallery = document.getElementById('gallery');
    try {
      const res = await fetch(SHEET_CSV_URL + '&t=' + new Date().getTime());
      if (!res.ok) throw new Error('Could not load sheet');
      const text = await res.text();
      
      allItems = parseCSV(text);
      buildFilters();
      renderGallery(allItems);
    } catch(e) {
      console.error(e);
      gallery.innerHTML = `<div class="status-msg"><div class="big">Coming soon</div><p>New works are currently being prepared. Check back shortly. ✦</p></div>`;
    }
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/["\s]/g,''));
    
    return lines.slice(1).map(line => {
      const vals = smartSplit(line);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (vals[i]||'').replace(/^"|"$/g,'').trim());
      return obj;
    }).filter(r => r.title && r.imageurl);
  }

  function smartSplit(line) {
    const result = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQuote = !inQuote; continue; }
      if (c === ',' && !inQuote) { result.push(cur); cur = ''; continue; }
      cur += c;
    }
    result.push(cur);
    return result;
  }

  function buildFilters() {
    const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))];
    if (cats.length === 0) return;
    const wrap = document.getElementById('filters');
    wrap.innerHTML = '<button class="filter-pill active" data-cat="all" onclick="filterBy(\'all\')">All Works</button>';
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-pill';
      btn.textContent = cat;
      btn.dataset.cat = cat;
      btn.onclick = () => filterBy(cat);
      wrap.appendChild(btn);
    });
  }

  function filterBy(cat) {
    activeFilter = cat;
    document.querySelectorAll('.filter-pill').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    const filtered = cat === 'all' ? allItems : allItems.filter(i => i.category === cat);
    renderGallery(filtered);
  }

  function renderGallery(items) {
    const gallery = document.getElementById('gallery');
    if (items.length === 0) {
      gallery.innerHTML = `<div class="status-msg"><div class="big">Nothing here yet</div><p>Check back soon ✦</p></div>`;
      return;
    }
    gallery.innerHTML = items.map((item, i) => `
      <div class="card" style="animation-delay:${i * 0.08}s" onclick="openLightbox(${i})">
        <div class="card-img-wrap">
          <img class="card-img" src="${item.imageurl}" alt="${item.title}" loading="lazy"
            onerror="this.parentElement.innerHTML='<div style=padding:4rem;text-align:center;color:#8b8371;font-size:13px>Image unavailable</div>'" />
          <div class="card-overlay">
            <span class="overlay-tag">${item.category || 'Artwork'}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-title">${item.title}</div>
          ${item.description ? `<div class="card-desc">${item.description}</div>` : ''}
          ${item.date ? `<div class="card-date">${item.date}</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  function openLightbox(idx) {
    const filtered = activeFilter === 'all' ? allItems : allItems.filter(i => i.category === activeFilter);
    const item = filtered[idx];
    if (!item) return;
    document.getElementById('lb-img').src = item.imageurl;
    document.getElementById('lb-title').textContent = item.title;
    document.getElementById('lb-desc').textContent = item.description || '';
    document.getElementById('lb-cat').textContent = item.category || 'Archive';
    document.getElementById('lb-date').textContent = item.date || '';
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e) {
    if (e && e.target !== e.currentTarget && !e.target.classList.contains('lb-close')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  loadSheet();
</script>
</body>
</html>
